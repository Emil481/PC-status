<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PC-status</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="status-panel" aria-labelledby="page-title">
        <div class="top-row">
          <div>
            <p class="eyebrow">PC-monitor</p>
            <h1 id="page-title">PC-status</h1>
          </div>
          <button id="refreshBtn" class="icon-button" type="button" title="Oppdater status" aria-label="Oppdater status">
            &#8635;
          </button>
        </div>

        <div class="status-grid">
          <article class="metric-card">
            <div class="metric-header">
              <span class="metric-icon" aria-hidden="true">%</span>
              <h2>Batteri</h2>
            </div>
            <div class="battery-meter" aria-hidden="true">
              <div id="batteryFill" class="battery-fill"></div>
            </div>
            <p id="batteryPercent" class="metric-value">Laster...</p>
            <p id="batteryState" class="metric-detail">Sjekker om PC-en lader.</p>
          </article>

          <article class="metric-card">
            <div class="metric-header">
              <span class="metric-icon" aria-hidden="true">+</span>
              <h2>Lokasjon</h2>
            </div>
            <p id="locationValue" class="metric-value small">Ikke hentet enn&aring;</p>
            <p id="locationDetail" class="metric-detail">Trykk p&aring; knappen for &aring; vise by og land.</p>
            <button id="locationBtn" class="primary-button" type="button">Hent lokasjon</button>
          </article>
        </div>

        <section id="chargeAdvice" class="advice" aria-live="polite">
          Venter p&aring; batteridata.
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
